name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev build-essential ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade buildozer cython==0.29.36

      - name: Build APK
        run: |
          yes | buildozer android debug || buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: marifin-apk
          path: bin/*.apk
